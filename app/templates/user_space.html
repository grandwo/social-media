{% extends "base.html" %}
{% block title %}个人空间{% endblock %}
{% block content %}
<div class="card">
    {% if not logged_in %}
    <p>请登录后查看个人空间。</p>
    <div class="actions">
        <a class="button" href="/login">登录</a>
        <a class="button button-secondary" href="/register">注册</a>
    </div>
    {% elif not exist_id %}
    <h2>用户不存在。</h2>
    {% else %}
    <div id="profileContainer" data-role="{{ role }}" data-target-id="{{ target_id }}" data-user-id="{{ user_id }}"
        data-are-friends="{{ are_friends }}" style="margin-top: 16px;"></div>
    {% endif %}
</div>
<script src="/static/js/user_space.js"></script>
{% endblock %}
