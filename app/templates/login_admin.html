{% extends "base.html" %}
{% block title %}管理员登录{% endblock %}
{% block content %}
<div class="card form-card">
    <h1 class="section-header">管理员登录</h1>
    <form id="loginForm">
        <label for="admin_id">管理员id</label>
        <input id="admin_id" name="admin_id" required />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" required />
        <div class="actions">
            <button type="submit">登录</button>
        </div>
    </form>

    <div class="info-card" style="margin-top:24px;">
        <p class="text-muted">如果是普通用户，请前往 <a href="/login">登录</a>。</p>
    </div>
</div>

<script src="/static/js/login_admin.js"></script>
{% endblock %}
