{% extends "base.html" %}
{% block title %}好友分组{% endblock %}
{% block content %}
<div class="card">
    <h1>好友分组</h1>
    {% if not logged_in %}
    <p>请登录后查看好友分组。</p>
    <div class="actions">
        <a class="button" href="/login">登录</a>
        <a class="button button-secondary" href="/register">注册</a>
    </div>
    {% elif role == "admin" %}
    <p>管理员无法查看好友分组</p>
    {% else %}
    <div id="createGroupSection">
        <button id = "createGroupButton">创建分组</button>
    </div>
    <div id="groupsContainer" data-user-id="{{ user_id }}" style="margin-top: 16px;"></div>
    {% endif %}
</div>
<script src="/static/js/friend_groups.js"></script>
{% endblock %}
