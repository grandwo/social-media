{% extends "base.html" %}
{% block title %}朋友圈{% endblock %}
{% block content %}
<div class="card">
    <h1>朋友圈</h1>
    {% if not logged_in %}
    <p>请登录后查看朋友圈。</p>
    <div class="actions">
        <a class="button" href="/login">登录</a>
        <a class="button button-secondary" href="/register">注册</a>
    </div>
    {% else %}
    <div id="postsContainer" data-post-id="{{ post_id }}" data-user-id="{{ user_id }}" data-role="{{ role }}"
        style="margin-top: 16px;"></div>
    <div id="commentsContainer" style="margin-top: 16px;"></div>
    {% endif %}
</div>
<script src="/static/js/post.js"></script>
{% endblock %}
